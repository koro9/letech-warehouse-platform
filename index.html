<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Apple Touch Icon — iOS / iPadOS 添加到主屏时用 -->
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <!-- 解锁 user-scalable：员工眼花/字小时能双指放大兜底；
         viewport-fit=cover 让 iOS 全面屏可以扩展到刘海/底栏区，配合 CSS env(safe-area-inset-*) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="format-detection" content="telephone=no" />
    <!-- iOS Safari 添加到主屏 / 状态栏样式（PWA 阶段会扩展，这里先打底） -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="theme-color" content="#6BAB9E" />
    <title>LeTech Warehouse Platform</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
