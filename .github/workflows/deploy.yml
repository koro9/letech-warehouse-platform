name: Deploy to AWS Sydney

# 跟 letech (Odoo 仓库) 用同一套 secrets：EC2_HOST / EC2_USER / EC2_SSH_KEY
# 服务器的 update-vue.sh 会自己 git pull + docker compose 重建 nginx 镜像

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -e
            cd /opt/odoo19-deploy/scripts
            bash update-vue.sh
